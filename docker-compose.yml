version: '3.8'

services:
  address-validation-api:
    build: .
    ports:
      - "30003:30003"
    environment:
      - PORT=30003
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - ADDRESS_API_KEY=${ADDRESS_API_KEY:-dev-address-key}
      - RAPIDAPI_PROXY_SECRET=${RAPIDAPI_PROXY_SECRET:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:30003/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - api-network

networks:
  api-network:
    driver: bridge
